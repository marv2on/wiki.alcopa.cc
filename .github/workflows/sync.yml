name: Sync Wiki

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download wiki
        run: |
          wget --mirror --convert-links --adjust-extension \
            --page-requisites --no-parent \
            --no-host-directories \
            -q https://wiki.alcopa.cc/

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "sync: $(date +'%d.%m.%Y %H:%M')"
          git push
