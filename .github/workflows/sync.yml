name: Sync Wiki
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install HTTrack
        run: sudo apt-get install -y httrack

      - name: Download wiki
        run: |
          LAST_MODIFIED=$(curl -sI https://wiki.alcopa.cc/ \
            | grep -i '^last-modified:' \
            | sed 's/last-modified: //I' \
            | xargs -I{} date -d "{}" +'%d.%m.%Y %H:%M' 2>/dev/null || true)
          echo "SYNC_DATE=${LAST_MODIFIED:-$(date +'%d.%m.%Y %H:%M')}" >> "$GITHUB_ENV"

          httrack https://wiki.alcopa.cc/ \
            --path /tmp/wiki_mirror \
            --mirror \
            --robots=0 \
            --index \
            --near \
            --stay-on-same-domain \
            --disable-security-limits \
            -%e0 \
            -q || true

          if [ -d /tmp/wiki_mirror/wiki.alcopa.cc ]; then
            rsync -a --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='hts-*' \
              /tmp/wiki_mirror/wiki.alcopa.cc/ ./
          fi

      - name: Commit changes
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "sync: ${{ env.SYNC_DATE }}"
          git push
