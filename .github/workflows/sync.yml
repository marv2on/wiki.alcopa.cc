name: Sync Wiki
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync site
        run: |
          LAST_MODIFIED=$(curl -sI https://wiki.alcopa.cc/ | grep -i '^last-modified:' | sed 's/last-modified: //I' | xargs -I{} date -d "{}" +'%d.%m.%Y %H:%M' 2>/dev/null || date +'%d.%m.%Y %H:%M')
          echo "SYNC_DATE=$LAST_MODIFIED" >> "$GITHUB_ENV"

          # Полная очистка + зеркало
          rm -rf /tmp/wiki_mirror
          mkdir -p /tmp/wiki_mirror
          
          wget --mirror --convert-links --adjust-extension --page-requisites \
            --no-parent --force-directories --directory-prefix=/tmp/wiki_mirror \
            https://wiki.alcopa.cc/ -q

          # Фикс Hugo структуры: все HTML без .html → dirname/index.html
          find /tmp/wiki_mirror -name "*.html" -o -type f | while read f; do
            if [[ "$f" != *.html ]] && grep -qi 'doctype html\|<html' "$f" 2>/dev/null; then
              dir=$(dirname "$f")
              mkdir -p "$dir/index.html.d"
              mv "$f" "$dir/index.html"
            fi
          done

          # Копируем в репо
          rsync -a --delete /tmp/wiki_mirror/wiki.alcopa.cc/ ./ \
            --exclude='.git' --exclude='.github' --exclude='CNAME'

      - name: Commit
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "sync: ${{ env.SYNC_DATE }}"
          git push
