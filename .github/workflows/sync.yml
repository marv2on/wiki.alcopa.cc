name: Sync Wiki
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean & Sync
        run: |
          LAST_MODIFIED=$(curl -sI https://wiki.alcopa.cc/ | grep -i '^last-modified:' | sed 's/last-modified: //I' | xargs -I{} date -d "{}" +'%d.%m.%Y %H:%M' 2>/dev/null || date +'%d.%m.%Y %H:%M')
          echo "SYNC_DATE=$LAST_MODIFIED" >> "$GITHUB_ENV"

          # Полная очистка репо
          git rm -rf . --ignore-unmatch
          
          # Скачиваем в /tmp
          mkdir -p /tmp/wiki
          wget -r -np -nH --cut-dirs=1 --directory-prefix=/tmp/wiki \
            --page-requisites --convert-links --adjust-extension \
            https://wiki.alcopa.cc/ -q

          # Фикс: все HTML файлы → dirname/index.html
          cd /tmp/wiki
          find . -type f \( -name "*.html" -o -path "*/index.html" \) | while read f; do
            dir=$(dirname "$f")
            if [[ "$f" != */index.html ]]; then
              mkdir -p "$dir/index.html.d"
              mv "$f" "$dir/index.html"
            fi
          done

          # Копируем в репо
          rsync -a /tmp/wiki/ ./ --delete --exclude='.git' --exclude='.github'

      - name: Commit
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "sync: ${{ env.SYNC_DATE }}"
          git push
