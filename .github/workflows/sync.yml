name: Sync Wiki

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download wiki
        run: |
          sudo apt-get install -y httrack
          httrack https://wiki.alcopa.cc/ \
            -O ./wiki_temp \
            -r4 \
            -%v \
            -s0 \
            "+*.wiki.alcopa.cc/*" \
            -q
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            wiki_temp/wiki.alcopa.cc/ ./ || [ $? -eq 24 ]
          rm -rf wiki_temp

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "sync: $(date +'%d.%m.%Y %H:%M')"
          git push
