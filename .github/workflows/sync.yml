name: Sync Wiki
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download wiki
        run: |
          LAST_MODIFIED=$(curl -sI https://wiki.alcopa.cc/ \
            | grep -i '^last-modified:' \
            | sed 's/last-modified: //I' \
            | xargs -I{} date -d "{}" +'%d.%m.%Y %H:%M' 2>/dev/null || true)

          if [ -z "$LAST_MODIFIED" ]; then
            LAST_MODIFIED=$(date +'%d.%m.%Y %H:%M')
          fi
          echo "SYNC_DATE=$LAST_MODIFIED" >> "$GITHUB_ENV"

          WIKI_TEMP=/tmp/wiki_temp
          mkdir -p "$WIKI_TEMP"

          wget \
            --mirror \
            --page-requisites \
            --convert-links \
            --force-directories \
            --no-parent \
            --no-check-certificate \
            --tries=3 \
            --timeout=30 \
            --directory-prefix="$WIKI_TEMP" \
            https://wiki.alcopa.cc/ || true

          if [ ! -d "$WIKI_TEMP/wiki.alcopa.cc" ]; then
            echo "::error::wget failed — $WIKI_TEMP/wiki.alcopa.cc not found"
            exit 1
          fi

          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='CNAME' \
            "$WIKI_TEMP/wiki.alcopa.cc/" ./

          echo "wikialcopa.isroot.in" > CNAME

      - name: Commit changes
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "sync: ${{ env.SYNC_DATE }}"
          git push
